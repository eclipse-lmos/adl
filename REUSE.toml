version = 1
SPDX-PackageName = "arc"
SPDX-PackageSupplier = "The Eclipse Foundation"
SPDX-PackageDownloadLocation = "https://github.com/eclipse-lmos/arc"


[[annotations]]
path = ["**/fonts/**",
    "**/assets/**",
    "**/flags.flagd.json",
    "**/*.md",
    "**/*.json",
    "**/org.eclipse.lmos.arc.agents.llm.CompleterLoaderService",
    "**/org.eclipse.lmos.arc.assistants.support.usecases.code.CodeBlockRunner",
    "**/org.eclipse.lmos.arc.agents.functions.LLMFunctionLoader",
    "**/chat/flutter*.js",
    "**/chat/canvaskit/**",
    "gradle/**",
    "gradlew",
    "gradlew.bat"]
precedence = "override"
SPDX-FileCopyrightText = "The original author or authors."
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = [
    "**/adl-studio/favicon.png",
    "**/adl-studio/icons/*.png",
    "**/adl-studio/main.dart.wasm",
    "**/adl-studio/main.dart.js",
    "**/adl-studio/main.dart.mjs",
    "**/adl-studio/index.html",
    "**/adl-studio/*.json",
    "**/adl-studio/**/*.json",
    "**/adl-studio/**/*.html",
    "**/adl-studio/**/*.txt",
    "**/adl-studio/**/*.css",
    "**/adl-studio/**/*.js",
    "**/adl-studio/**/*.ico",
    "**/adl-studio/*.json",
    "**/adl-studio/*.html",
    "**/adl-studio/*.txt",
    "**/adl-studio/*.css",
    "**/adl-studio/*.js",
    "**/adl-studio/*.ico",
    "**/adl-studio/*.ts",
    "**/adl-studio/*.tsx",
]
precedence = "override"
SPDX-FileCopyrightText = "2025 Deutsche Telekom AG and others"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = ["docs-src/docs/**",
    "docs-src/src/**",
    "docs-src/*.json",
    "docs-src/blog/**",
    "docs-src/static/**",
    "docs/**"
]
precedence = "override"
SPDX-FileCopyrightText = "The original author or authors."
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = ["**/.gitignore", ".gitattributes", "**/README.md", "CODEOWNERS"]
precedence = "aggregate"
SPDX-FileCopyrightText = "none"
SPDX-License-Identifier = "CC0-1.0"
